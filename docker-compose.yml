version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: analytics-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-analytics_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-analytics_pass}
      POSTGRES_DB: ${POSTGRES_DB:-analytics_db}
    ports:
      - "127.0.0.1:15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-analytics_user} -d ${POSTGRES_DB:-analytics_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-05-10T01-41-38Z
    container_name: analytics-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  createbuckets:
    image: minio/mc:RELEASE.2024-04-18T16-45-29Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc config host add myminio http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin} > /dev/null 2>&1;
      /usr/bin/mc ls myminio/${MINIO_BUCKET_NAME:-imports} > /dev/null 2>&1 || /usr/bin/mc mb myminio/${MINIO_BUCKET_NAME:-imports} > /dev/null 2>&1;
      exit 0;
      "

  api:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: analytics-api
    environment:
      - DATABASE_URL=postgresql+psycopg://${POSTGRES_USER:-analytics_user}:${POSTGRES_PASSWORD:-analytics_pass}@db:5432/${POSTGRES_DB:-analytics_db}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - MINIO_SECURE=false
      - MINIO_BUCKET_NAME=${MINIO_BUCKET_NAME:-imports}
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: analytics-worker
    command: ["python", "-m", "app.worker.main"]
    environment:
      - DATABASE_URL=postgresql+psycopg://${POSTGRES_USER:-analytics_user}:${POSTGRES_PASSWORD:-analytics_pass}@db:5432/${POSTGRES_DB:-analytics_db}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - MINIO_SECURE=false
      - MINIO_BUCKET_NAME=${MINIO_BUCKET_NAME:-imports}
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: analytics-frontend
    depends_on:
      - api

volumes:
  postgres_data:
  minio_data:
